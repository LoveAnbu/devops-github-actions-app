name: CI/CD with DockerHub + Trivy

on:
  push:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for Secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --verbose --redact  

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
         project: "myapp"
         path: "."
         format: "HTML"
         out: "reports"    

      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
         name: dependency-check-report
         path: reports   

      # 2. SonarCloud Scan
      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@master
        with:
          args: >
            -Dsonar.projectKey=LoveAnbu_devops-github-actions-app
            -Dsonar.organization=loveanbu
            -Dsonar.sources=.
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}  

      # 3. Docker login
      - name: Login to DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 4. Build image
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/myapp:latest

      # 5. Trivy scan
      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/myapp:latest
          format: table
          severity: CRITICAL
          exit-code: '0'

      # 6. Push
      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp:latest

      # 7. Deploy
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            NEW_IMAGE=${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }}

            echo "Getting current running container..."
            OLD_CONTAINER=$(docker ps --filter "name=myapp" --format "{{.ID}}")
            OLD_IMAGE=$(docker inspect --format='{{.Config.Image}}' $OLD_CONTAINER || true)

            echo "Old image: $OLD_IMAGE"

            echo "Pull new image"
            docker pull $NEW_IMAGE

            echo "Stop and remove old container"
            docker stop myapp || true
            docker rm myapp || true

            echo "Run new container"
            docker run -d -p 8000:8000 --name myapp $NEW_IMAGE

            echo "Waiting for app..."
            sleep 5

            echo "Health check..."
            if curl -f http://localhost:8000/health; then
              echo "Deployment successful ✅"
            else
              echo "Deployment failed ❌ → rolling back..."

              docker stop myapp || true
              docker rm myapp || true

            if [ ! -z "$OLD_IMAGE" ]; then
              echo "Restoring old image..."
              docker run -d -p 8000:8000 --name myapp $OLD_IMAGE
              echo "Rollback completed 🔁"
            else
              echo "No previous image found!"
            fi

            exit 1
            fi

  docker image prune -af
