name: CI/CD with DockerHub + Trivy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 🔹 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v3

      # 🔹 2. Login to DockerHub
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 🔹 3. Build Docker Image
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/myapp:latest .

      # 🔹 4. Install Trivy (FIXED METHOD)
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb stable main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      # 🔹 5. Scan Docker Image
      - name: Scan Docker Image
        run: |
          trivy image ${{ secrets.DOCKER_USERNAME }}/myapp:latest

      # 🔹 6. Push Image to DockerHub
      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/myapp:latest

      # 🔹 7. Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 54.156.46.128
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop myapp || true
            docker rm myapp || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/myapp:latest
            docker run -d -p 8000:8000 --name myapp ${{ secrets.DOCKER_USERNAME }}/myapp:latest
